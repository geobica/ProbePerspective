<html>
<style>
.prevent-select {
  -webkit-user-select: none; /* Safari */
  -ms-user-select: none; /* IE 10 and IE 11 */
  user-select: none; /* Standard syntax */
}
</style>
<svg id="timeline" style="position: absolute;left:0;top:0;" width="100%" height="10%">
</svg>
<svg id="minimap" style="position: absolute;left:70%;top:75%;" width="30%" height="25%">
</svg>
<svg id="simulation" style="position: absolute;left:0%;top:10%;" width="35%" height="35%">
</svg>
<select id="speed_dropdown" style="position: absolute;left:0;top:0;">
	<option>1x</option>
	<option>10x</option>
	<option>100x</option>
	<option>1000x</option>
	<option>10000x</option>
	<option>100000x</option>
	<option>1000000x</option>
	<option>10000000x</option>
	<option>100000000x</option>
	<option>1000000000x</option>
</select>
<script>

const SPICE_OFFSET = 946727935.816; // difference between unix and J2000

function findTimeIndex(data, t){
  const n = data.length;

  if(n < 2) return -1;

  if(t-SPICE_OFFSET <= data[0][0]) return 0;
  if(t-SPICE_OFFSET >= data[n - 1][0]) return n - 2;

  let lo = 0;
  let hi = n - 2;

  while(lo <= hi){
    const mid = Math.floor((lo + hi) / 2);

    const t0 = data[mid][0];
    const t1 = data[mid + 1][0];

    if(t0 <= t-SPICE_OFFSET && t-SPICE_OFFSET < t1){
      return mid;
    }else if (t-SPICE_OFFSET < t0){
      hi = mid - 1;
    }else{
      lo = mid + 1;
    }
  }

  return -1;
}

function progress(A, B, p){
  return A.map((a, i) => p * a + (1 - p) * B[i]);
}

function positionAtTime(data, t){
	let i=findTimeIndex(data, t);
	if(i==-1){
		return [0,0,0];
	}
	let before_xyz = data[i];
	let after_xyz = data[Math.min(data.length-1,i+1)];
	let t_xyz = progress(before_xyz,after_xyz,((t-SPICE_OFFSET)-before_xyz[0])/(after_xyz[0]-before_xyz[0]));
	return t_xyz;
}


async function loadCSV(url){
  const response = await fetch(url);
  const text = await response.text();

  const rows = text.trim().split("\n").map(line => line.split(",").map(Number));

  return rows;
}

let cassini_positions = [];
loadCSV("cassini_positions.csv").then(data => {
  cassini_positions = data;
});
let earth_positions = [];
loadCSV("earth_positions.csv").then(data => {
  earth_positions = data;
});
let saturn_positions = [];
loadCSV("saturn_positions.csv").then(data => {
  saturn_positions = data;
});




const timeline = document.getElementById("timeline");
timeline.setAttribute("height", window.innerHeight * 0.1);
const minimap = document.getElementById("minimap");
minimap.setAttribute("width", window.innerWidth * 0.3);
minimap.setAttribute("height", window.innerHeight * 0.2);
const simulation = document.getElementById("simulation");
simulation.setAttribute("width", window.innerWidth * 0.35);
simulation.setAttribute("height", window.innerWidth * 0.35);

let dropdown_width = 70;
let playbutton_width = 20;
let timetext_width = 100;

document.getElementById("speed_dropdown").setAttribute("style","position: absolute;left:"+(timeline.height.animVal.value*0.3)+";top:"+(timeline.height.animVal.value*0.3)+";width:"+(dropdown_width)+";");

let greybox_start_x = timeline.height.animVal.value*0.7+dropdown_width+playbutton_width;
let greybox_end_x = timeline.width.animVal.value-timetext_width-timeline.height.animVal.value*0.6;

let timeline_start_ts = Math.floor(new Date("1997-10-15T08:43:00").getTime() / 1000); // Source: wikipedia lmao
let timeline_end_ts = Math.floor(new Date("2017-09-15T11:55:46").getTime() / 1000);

let playing_time = false;

let clicked_ts = timeline_start_ts;

function redraw_timeline(){
	greybox_start_x = timeline.height.animVal.value*0.7+dropdown_width+playbutton_width;
	greybox_end_x = timeline.width.animVal.value-timetext_width-timeline.height.animVal.value*0.6;
	timeline.innerHTML = '<rect x="'+(greybox_start_x)+'" y="'+(timeline.height.animVal.value*0.4)+'" width="'+(greybox_end_x-greybox_start_x)+'" height="'+(timeline.height.animVal.value*0.2)+'" fill="#777777"/>\
	<rect id="handle" x="'+(greybox_start_x-5)+'" y="'+(timeline.height.animVal.value*0.2)+'" width="'+(10)+'" height="'+(timeline.height.animVal.value*0.6)+'" fill="#aaaaaa"/>\
	<text id="playbutton" class="prevent-select" x="'+(timeline.height.animVal.value*0.5+dropdown_width+playbutton_width*0.5)+'" y="'+(timeline.height.animVal.value*0.5)+'" text-anchor="middle" dominant-baseline="middle" class="small">▶️</text>\
	<text id="settime" x="'+(timeline.width.animVal.value-timetext_width/2-timeline.height.animVal.value*0.3)+'" y="'+(timeline.height.animVal.value*0.5)+'" text-anchor="middle" dominant-baseline="middle" class="small">My</text>';
	redraw_time();
}
function redraw_minimap(){
	minimap.innerHTML = '<circle id="cassini_circle" cx="'+(minimap.width.animVal.value*0.5)+'" cy="'+(minimap.height.animVal.value*0.5)+'" r="'+(10)+'" fill="#aa8822"/>\
	<circle id="earth_circle" cx="'+(minimap.width.animVal.value*0.5)+'" cy="'+(minimap.height.animVal.value*0.5)+'" r="'+(10)+'" fill="#2244aa"/>\
	<circle id="saturn_circle" cx="'+(minimap.width.animVal.value*0.5)+'" cy="'+(minimap.height.animVal.value*0.5)+'" r="'+(10)+'" fill="#ff9944"/>';
}
function redraw_simulation(){

	simulation.innerHTML = '<circle id="cassini_center" cx="'+(simulation.width.animVal.value*0.5)+'" cy="'+(simulation.height.animVal.value*0.5)+'" r="'+(10)+'" fill="#aa8822"/>\
	<circle id="earth_center" cx="'+(simulation.width.animVal.value*0.5)+'" cy="'+(simulation.height.animVal.value*0.5)+'" r="'+(10)+'" fill="#2244aa"/>\
	<circle id="saturn_center" cx="'+(simulation.width.animVal.value*0.5)+'" cy="'+(simulation.height.animVal.value*0.5)+'" r="'+(10)+'" fill="#ff9944"/>';
}

function extractRotmat(arr){
  return [
    [arr[4],  arr[5],  arr[6]],
    [arr[7],  arr[8],  arr[9]],
    [arr[10], arr[11], arr[12]]
  ];
}

function transposeMat(m){
  return [
    [m[0][0], m[1][0], m[2][0]],
    [m[0][1], m[1][1], m[2][1]],
    [m[0][2], m[1][2], m[2][2]]
  ];
}

function multiplyMatVec(m, v){
  const x = v[0];
  const y = v[1];
  const z = v[2];

  return [
    m[0][0]*x + m[0][1]*y + m[0][2]*z,
    m[1][0]*x + m[1][1]*y + m[1][2]*z,
    m[2][0]*x + m[2][1]*y + m[2][2]*z
  ];
}

function vecDiff(a, b){
  return [
    a[0]-b[0],
    a[1]-b[1],
    a[2]-b[2]
  ];
}


function redraw_time(){
	const AU = 149597870.7; // km
	// Saturn is 9~10.1 AU from the Sun, so I'll make the minimap show out to 11 AU
	document.getElementById("settime").innerHTML = new Date(clicked_ts * 1000).toISOString();
	document.getElementById("handle").setAttribute("x",-5+greybox_start_x+(greybox_end_x-greybox_start_x)*(clicked_ts-timeline_start_ts)/(timeline_end_ts-timeline_start_ts));
	let cassini_position = positionAtTime(cassini_positions,clicked_ts);
	document.getElementById("cassini_circle").setAttribute("cx",minimap.width.animVal.value*0.5+minimap.height.animVal.value*0.5*cassini_position[1]/AU/11);
	document.getElementById("cassini_circle").setAttribute("cy",minimap.height.animVal.value*0.5+minimap.height.animVal.value*0.5*cassini_position[2]/AU/11);
	let earth_position = positionAtTime(earth_positions,clicked_ts);
	document.getElementById("earth_circle").setAttribute("cx",minimap.width.animVal.value*0.5+minimap.height.animVal.value*0.5*earth_position[1]/AU/11);
	document.getElementById("earth_circle").setAttribute("cy",minimap.height.animVal.value*0.5+minimap.height.animVal.value*0.5*earth_position[2]/AU/11);
	let saturn_position = positionAtTime(saturn_positions,clicked_ts);
	document.getElementById("saturn_circle").setAttribute("cx",minimap.width.animVal.value*0.5+minimap.height.animVal.value*0.5*saturn_position[1]/AU/11);
	document.getElementById("saturn_circle").setAttribute("cy",minimap.height.animVal.value*0.5+minimap.height.animVal.value*0.5*saturn_position[2]/AU/11);


	const SATURN_RADIUS = 58232; //km
	const FOV = 0.0302; //radians

	let orientation_rotmat = extractRotmat(cassini_position);
	let oriented_saturnpos = multiplyMatVec(orientation_rotmat,vecDiff(saturn_position,cassini_position));
	document.getElementById("saturn_center").setAttribute("cx",simulation.width.animVal.value*0.5+simulation.height.animVal.value*0.5*oriented_saturnpos[1]/oriented_saturnpos[0]);
	document.getElementById("saturn_center").setAttribute("cy",simulation.height.animVal.value*0.5+simulation.height.animVal.value*0.5*oriented_saturnpos[2]/oriented_saturnpos[0]);
	console.log(-simulation.height.animVal.value/FOV*SATURN_RADIUS/oriented_saturnpos[0]);
	document.getElementById("saturn_center").setAttribute("r",-simulation.height.animVal.value/FOV*SATURN_RADIUS/oriented_saturnpos[0]);

	console.log(oriented_saturnpos);
	// cassini_position
}

redraw_minimap();
redraw_simulation();
redraw_timeline();
timetext_width = document.getElementById("settime").getBBox().width;
redraw_timeline();

function mouseevent(event){
	if(dragging_time){
		clicked_ts = timeline_start_ts+(timeline_end_ts-timeline_start_ts)*Math.min(1,Math.max(0,(event.clientX-greybox_start_x)/(greybox_end_x-greybox_start_x)));
		redraw_time();
	}
}

let dragging_time = false;

document.addEventListener("mousedown", (event) => {
	if(event.clientY<timeline.height.animVal.value&&event.clientX>=greybox_start_x&&event.clientX<=greybox_end_x){
		dragging_time = true;
	}else{
		dragging_time = false;
	}
	if(event.clientY<=timeline.height.animVal.value*0.7&&event.clientY>=timeline.height.animVal.value*0.3&&event.clientX>=timeline.height.animVal.value*0.5+dropdown_width&&event.clientX<=timeline.height.animVal.value*0.5+dropdown_width+playbutton_width){
		if(playing_time){
			playing_time = false;
			document.getElementById("playbutton").innerHTML = "▶️";
		}else{
			playing_time = true;
			document.getElementById("playbutton").innerHTML = "⏸️";
		}
	}
	mouseevent(event);
});
document.addEventListener("mouseup", (event) => {
	dragging_time = false;
	mouseevent(event);
});

document.addEventListener("mousemove", (event) => {
	if(dragging_time){
		mouseevent(event);
	}
});

let lastTime = 0;
function main(currentTime){
	const deltaT = currentTime*0.001 - lastTime;
	lastTime = currentTime*0.001;
	let speed = parseInt(document.getElementById("speed_dropdown").value.slice(0, -1));
	if(!dragging_time&&playing_time){
		clicked_ts += speed*deltaT;
		clicked_ts = Math.min(timeline_end_ts,Math.max(timeline_start_ts,clicked_ts));
		redraw_time();
	}
	requestAnimationFrame(main);
}
requestAnimationFrame(main);

</script>
</html>
